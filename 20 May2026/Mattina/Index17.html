<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles17.css" />
  </head>
  <body>
    <h1 id="title">Titolo originale</h1>

    <p id="textP">Paragrafo.</p>

    <button id="button">Cambia contenuto</button>

    <ul id="list">
      <li>Elemento 1</li>

      <li>Elemento 2</li>
    </ul>
  </body>
  <script src="main17.js"></script>
</html>

<!-- 

Nel file HTML vengono creati
gli elementi della pagina:

titolo, paragrafo, bottone e
lista.

Ogni elemento importante ha un
id per poter essere selezionato
in JavaScript.

Nel file JS gli elementi
vengono salvati in variabili
tramite getElementById().

Con innerHTML viene modificato
il contenuto degli elementi.

Con addEventListener() viene
gestito il click del bottone.

Con createElement() viene
creato un nuovo elemento HTML
dinamicamente.

Con appendChild() il nuovo
elemento viene aggiunto alla
lista presente nella pagina.

-->
