<h2>Written Signal - EXE</h2>

<!-- Semaforo: attiva e disattiva i colori sulla base del button con le logiche dell'Else If inserite in TS -->

<div class="trafficLight" [class]="trafficLightColors()">
  <div class="light red"></div>
  <div class="light yellow"></div>
  <div class="light green"></div>
</div>

<!-- Valore corrente (letterale) -->

<p>Current Color: {{ trafficLightColors() }}</p>

<button (click)="updateColor()">Change Traffic Light Color</button>
