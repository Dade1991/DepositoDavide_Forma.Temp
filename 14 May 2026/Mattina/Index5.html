<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles5.css" />
  </head>
  <body>
    <!-- Esempio relativo all'utilizzo di variabili per CSS con pseudo selettore ":root" -->

    <div class="card">
      <h1>Title</h1>

      <p>Card content</p>
    </div>

    <!-- Esempio su pseudo elementi ::before & ::after  -->

    <div>
      <p class="message">Important Element</p>
    </div>

    <!-- Esempio su transazioni ed animazioni -->

    <div class="box"></div>

    <!-- Esempio relativo a Visibility e Display -->

    <div>
      <div class="box1">Visible Element</div>
      <div class="box2">Hidden Element</div>
      <div class="box3">Removed Element</div>
    </div>
  </body>
</html>
