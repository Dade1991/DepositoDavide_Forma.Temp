<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles3.css" />
  </head>
  <body>
    <!-- Di seguito faremo un esempio di utilizzo di Position Relative & Absolute -->

    <!-- Div "padre" -->
    <div class="contenitore">
      Elemento padre
      <!-- Div "figlio" -->
      <div class="box">Elemento figlio</div>
    </div>

    <!-- Di seguito faremo un esempio di utilizzo per Flexbox -->

    <div class="flexBoxContainer">
      <div class="flexBoxItem">Item_1</div>
      <div class="flexBoxItem">Item_2</div>
      <div class="flexBoxItem">Item_3</div>
      <div class="flexBoxItem">Item_4</div>
    </div>

    <!-- Di seguito faremo un esempio di utilizzo per le griglie -->

    <div class="gridBoxContainer">
      <div class="gridItem">Item_1</div>
      <div class="gridItem">Item_2</div>
      <div class="gridItem">Item_3</div>
      <div class="gridItem">Item_4</div>
    </div>

    <!-- Di seguito faremo un esempio di utilizzo per le griglie, questa volta con multiple righe-->

    <div class="grid2BoxContainer">
      <div class="gridItem2 grid2Item1">Item_1</div>
      <div class="gridItem2 grid2Item2">Item_2</div>
      <div class="gridItem2 grid2Item3">Item_3</div>
      <div class="gridItem2 grid2Item4">Item_4</div>
      <div class="gridItem2 grid2Item5">Item_5</div>
      <div class="gridItem2 grid2Item6">Item_6</div>
    </div>

    <!-- Di seguito faremo un esempio di utilizzo per le griglie, questa volta con multiple righe-->

    <div class="gridTemplateAreaContainer">
      <div class="header">Header</div>
      <div class="siderbar">Sidebar</div>
      <div class="content">Content</div>
      <div class="footer">Footer</div>
    </div>
  </body>
</html>
